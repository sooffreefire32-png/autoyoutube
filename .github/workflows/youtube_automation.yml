name: YouTube Automation Workflow

on:
  push:
    paths:
      - 'script.txt'
  workflow_dispatch:
  schedule:
    # Runs at 00:00 Pacific Time (which is 07:00 UTC) every day
    # This ensures the daily quota resets before the workflow runs
    - cron: '0 7 * * *'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests google-api-python-client google-auth-oauthlib google-auth-httplib2
          sudo apt-get install ffmpeg

      - name: Run Video Processing
        env:
          IMAGE_API_URL: ${{ secrets.IMAGE_API_URL }}
          IMAGE_API_KEY: ${{ secrets.IMAGE_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: python scripts/process_video.py

      - name: Upload to YouTube
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
          MAX_DAILY_UPLOADS: 6 # Set a safe daily upload limit
        run: python scripts/youtube_upload.py
